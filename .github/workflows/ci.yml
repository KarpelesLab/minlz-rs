name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta, nightly]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests (lib)
        run: cargo test --lib --verbose

      - name: Run tests (comprehensive)
        run: cargo test --test comprehensive --verbose

      - name: Run tests (property tests)
        run: cargo test --test proptest --verbose

      - name: Run tests (snappy compatibility)
        run: cargo test --test snappy_compat --verbose

      - name: Run tests (MinLZ reference vectors)
        run: cargo test --test minlz_compat --verbose

      - name: Run doc tests
        run: cargo test --doc --verbose

      - name: Build and test the CLI tools
        run: cargo test --features cli --test mz_cli --verbose

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  minimal-versions:
    name: Minimal Versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-hack
        run: cargo install cargo-hack

      - name: Install cargo-minimal-versions
        run: cargo install cargo-minimal-versions

      # Validate the library's declared dependency minimums. The `cli` feature
      # is excluded on purpose: its app-level deps (clap/anyhow/indicatif) pull
      # in proc-macro crates whose `-Z minimal-versions` resolution is broken
      # ecosystem-wide (e.g. proc-macro2 1.0.0 / `proc_macro_span_shrink`), which
      # is not something this crate's minimums can fix.
      - name: Check minimal versions (library features)
        run: cargo minimal-versions check --no-default-features --features std,s2,minlz,concurrent

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run benchmarks
        run: cargo bench --no-run --verbose

  test-all-features:
    name: Test All Feature Combinations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # The test harness needs std, so no-default-features runs only build. Each
      # codec is exercised on its own; the dedicated `no-std` job below proves
      # they link on a bare-metal target.
      - name: Build S2 only (no std)
        run: cargo build --no-default-features --features s2 --verbose

      - name: Build MinLZ only (no std)
        run: cargo build --no-default-features --features minlz --verbose

      - name: Build both codecs with std
        run: cargo build --no-default-features --features std,s2,minlz --verbose

      - name: Test with all features
        run: cargo test --all-features --verbose

  no-std:
    name: no_std (bare-metal)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi

      - name: Build S2 (no_std + alloc) for thumbv7em-none-eabi
        run: cargo build --lib --no-default-features --features s2 --target thumbv7em-none-eabi --verbose

      - name: Build MinLZ (no_std + alloc) for thumbv7em-none-eabi
        run: cargo build --lib --no-default-features --features minlz --target thumbv7em-none-eabi --verbose
